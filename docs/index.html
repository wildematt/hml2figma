<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Html2Figma</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      background: linear-gradient(180deg, #f8fbff, #eef5ff);
      color: #1d1d1f;
    }
    .box {
      width: min(720px, 92vw);
      background: #fff;
      border: 1px solid #e7ecf4;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    }
    h1 { margin: 0 0 8px; }
    p { margin: 10px 0; line-height: 1.6; }
    a { color: #0d99ff; }
  </style>
</head>
<body>
  <main class="box">
    <h1>Html2Figma</h1>
    <p>Official static pages for the Html2Figma extension.</p>
    <p>Privacy policy: <a href="./privacy.html">privacy.html</a></p>
  </main>
</body>
</html>
